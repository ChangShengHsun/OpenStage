# Release: push a tag like `v0.2.0` and this builds the Windows .exe (NSIS)
# and the macOS .pkg, then publishes both to a GitHub Release of that tag.
# electron-builder also uploads latest.yml, which packaged Windows apps use
# to auto-update (see apps/desktop/main.cjs).
#
# To cut a release:
#   git tag v0.2.0 && git push origin v0.2.0
name: Release

on:
  workflow_dispatch: 
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  installers:
    strategy:
      fail-fast: false
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Sync desktop version from the tag
        # Only on a v* tag push; a manual (workflow_dispatch) run has no tag,
        # so it builds with package.json's current version instead of "main".
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          node -e "
            const fs = require('fs');
            const p = 'apps/desktop/package.json';
            const j = JSON.parse(fs.readFileSync(p, 'utf8'));
            j.version = process.argv[1];
            fs.writeFileSync(p, JSON.stringify(j, null, 2) + '\n');
          " "$VERSION"

      - name: Build installer and publish to the GitHub release
        run: pnpm --filter @gridstage/desktop dist --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
