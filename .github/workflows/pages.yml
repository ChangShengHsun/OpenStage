# Deploys the web app to GitHub Pages on every push to main, so phone
# users (Android/iOS) can open it in a browser and "Add to Home Screen" —
# the PWA manifest + service worker make it behave like an installed app.
# Live at: https://changshenghsun.github.io/GridStage/
#
# Publishes by force-pushing the build to the gh-pages branch (a generated
# artifact branch, its history is disposable). The official actions/deploy-pages
# path needs Pages pre-enabled via repo Settings, which GITHUB_TOKEN cannot do;
# creating a gh-pages branch enables Pages automatically.
name: Deploy to GitHub Pages

on:
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Build for the /GridStage/ subpath
        run: pnpm --filter @gridstage/web build
        env:
          GRIDSTAGE_BASE: /GridStage/
      - name: Publish dist to the gh-pages branch
        run: |
          cd apps/web/dist
          touch .nojekyll
          git init -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "deploy ${GITHUB_SHA}"
          git push --force "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
